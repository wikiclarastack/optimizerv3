<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxz Optimizator | End-To-End</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</head>
<body class="bg-[#050505] text-white">

    <nav class="fixed w-full z-50 p-6 glass-nav flex justify-between items-center border-b border-white/5">
        <div class="text-2xl font-black italic tracking-tighter uppercase">FLUXZ<span class="text-cyan-500">.</span></div>
        <div id="nav-actions">
            <button onclick="router('login')" class="bg-white/5 hover:bg-cyan-500 hover:text-black px-6 py-2 rounded-full border border-white/10 transition-all text-xs font-bold uppercase tracking-widest">Portal</button>
        </div>
    </nav>

    <section id="home-page" class="min-h-screen flex flex-col justify-center items-center text-center px-6">
        <h1 class="text-7xl md:text-9xl font-black mb-6 tracking-tighter leading-none italic uppercase reveal">Optimizator <br><span class="gradient-text">Engine.</span></h1>
        <button onclick="router('login')" class="bg-cyan-500 text-black px-12 py-5 rounded-2xl font-black text-xl hover:scale-105 transition-all shadow-cyan reveal">ACESSAR SISTEMA</button>
    </section>

    <section id="login-page" class="min-h-screen flex items-center justify-center px-6 hidden">
        <div class="w-full max-w-md glass p-10 rounded-[40px] border border-white/10 shadow-2xl reveal">
            <h2 class="text-3xl font-black mb-8 text-center italic uppercase tracking-tighter">Login</h2>
            <form id="loginForm" class="space-y-4">
                <input type="email" id="email" placeholder="E-mail" class="w-full p-5 bg-white/5 border border-white/10 rounded-2xl focus:border-cyan-500 outline-none transition-all font-mono" required>
                <input type="password" id="password" placeholder="Senha" class="w-full p-5 bg-white/5 border border-white/10 rounded-2xl focus:border-cyan-500 outline-none transition-all font-mono" required>
                <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-400 text-black py-5 rounded-2xl font-black uppercase tracking-widest shadow-lg">Entrar</button>
                <button type="button" onclick="router('home')" class="w-full text-gray-500 text-xs hover:text-white mt-4 uppercase tracking-[0.2em]">Voltar</button>
            </form>
        </div>
    </section>

    <section id="dashboard-page" class="min-h-screen p-6 pt-32 hidden">
        <div class="max-w-6xl mx-auto">
            
            <div id="admin-tools" class="hidden mb-12 p-8 glass-admin border border-red-500/20 rounded-[40px] reveal">
                <h3 class="text-red-500 font-black italic mb-6 flex items-center gap-2 uppercase tracking-tighter">
                    <i data-lucide="shield-alert"></i> Painel de Administração
                </h3>
                <form id="adminUpdateForm" class="grid md:grid-cols-3 gap-4">
                    <input type="text" id="version" placeholder="Versão (ex: v2.5)" class="p-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-red-500" required>
                    <input type="text" id="changelog" placeholder="O que mudou?" class="md:col-span-2 p-4 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-red-500" required>
                    <button type="submit" class="md:col-span-3 bg-red-600 hover:bg-red-500 py-4 rounded-xl font-black uppercase tracking-widest transition-all">Publicar Update Agora</button>
                </form>
            </div>

            <header class="flex justify-between items-center mb-16">
                <div class="reveal">
                    <h2 class="text-5xl font-black italic tracking-tighter uppercase">Dashboard</h2>
                    <p class="text-cyan-400 font-mono text-xs mt-2 uppercase tracking-widest opacity-70" id="display-user"></p>
                </div>
                <button onclick="logout()" class="p-4 bg-red-500/10 text-red-500 rounded-2xl hover:bg-red-500 hover:text-white transition-all">
                    <i data-lucide="log-out"></i>
                </button>
            </header>

            <div class="grid lg:grid-cols-3 gap-10">
                <div class="lg:col-span-2 space-y-10">
                    <div class="p-1 bg-gradient-to-r from-cyan-500 to-purple-600 rounded-[40px] reveal">
                        <div class="bg-[#0a0a0a] p-10 rounded-[38px] flex flex-col md:flex-row justify-between items-center gap-6">
                            <h3 class="text-2xl font-black italic">FLUXZ PRO ENGINE</h3>
                            <button class="bg-white text-black px-10 py-5 rounded-2xl font-black hover:bg-cyan-400 transition-all uppercase italic">Download v2.4.1</button>
                        </div>
                    </div>
                    
                    <div class="p-8 glass rounded-[40px] reveal">
                        <h3 class="text-xl font-bold mb-8 italic uppercase tracking-tighter underline decoration-cyan-500 underline-offset-8">Patch Notes</h3>
                        <div id="updatesContainer" class="space-y-6"></div>
                    </div>
                </div>

                <div class="space-y-8 reveal">
                    <div class="glass p-8 rounded-[40px] border border-cyan-500/10">
                        <h4 class="text-[10px] font-bold text-gray-500 uppercase mb-6 tracking-[0.3em]">Status</h4>
                        <div class="space-y-4 text-sm">
                            <div class="flex justify-between"><span>Licença</span><span class="text-green-400">ATIVADA</span></div>
                            <div class="flex justify-between"><span>Servidor</span><span class="text-cyan-400">ONLINE</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
