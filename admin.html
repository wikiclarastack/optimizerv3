<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxz | Command Center</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</head>
<body class="bg-[#050505] text-white min-h-screen flex items-center justify-center p-6">

    <div class="fixed top-0 left-0 w-full h-full pointer-events-none z-[-1] opacity-50">
        <div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] bg-red-900/10 blur-[120px] rounded-full"></div>
    </div>

    <main class="w-full max-w-2xl reveal">
        <div class="glass p-10 rounded-[40px] border border-white/10 shadow-2xl relative overflow-hidden">
            <div class="flex items-center gap-4 mb-10">
                <div class="p-4 bg-red-500/20 rounded-2xl border border-red-500/40">
                    <i data-lucide="terminal" class="text-red-500 w-8 h-8"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-black italic tracking-tighter uppercase">Admin <span class="text-red-500">Panel</span></h1>
                    <p class="text-gray-500 text-[10px] uppercase tracking-[0.3em]">Fluxz Optimizator System</p>
                </div>
            </div>

            <form id="adminUpdateForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-widest ml-2">Versão da Build</label>
                    <input type="text" id="version" placeholder="Ex: v2.4.2-stable" 
                        class="w-full p-5 bg-white/5 border border-white/10 rounded-2xl focus:border-red-500 outline-none transition-all font-mono text-red-400" required>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-widest ml-2">Notas de Atualização</label>
                    <textarea id="changelog" rows="5" placeholder="Descreva as melhorias técnicas..." 
                        class="w-full p-5 bg-white/5 border border-white/10 rounded-2xl focus:border-red-500 outline-none transition-all font-light text-gray-300 resize-none" required></textarea>
                </div>

                <div class="pt-4">
                    <button type="submit" id="submitBtn" class="group w-full bg-white text-black py-5 rounded-2xl font-black text-lg transition-all hover:bg-red-600 hover:text-white flex items-center justify-center gap-3">
                        <i data-lucide="send" class="w-5 h-5 group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"></i>
                        PUBLICAR UPDATE AGORA
                    </button>
                </div>
            </form>

            <div class="mt-8 pt-8 border-t border-white/5 flex justify-between items-center text-[10px] text-gray-600 font-bold uppercase tracking-widest">
                <span>Status: <span class="text-green-500">Authorized</span></span>
                <a href="index.html" class="hover:text-white transition-colors">Sair do Painel</a>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = "https://ohozsfqsocwjpwoioqef.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ob3pzZnFzb2N3anB3b2lvcWVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTYxNTIsImV4cCI6MjA4OTE3MjE1Mn0.Of-dTDu17P62PK24kTn4IQfqNjUJLvmpisw481e-Yoc";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        lucide.createIcons();

        function notify(text, success = true) {
            Toastify({
                text: text,
                duration: 4000,
                gravity: "top",
                position: "center",
                style: { 
                    background: "#0a0a0a", 
                    border: `1px solid ${success ? '#ef4444' : '#ef4444'}`, 
                    borderRadius: "20px",
                    color: success ? "#fff" : "#ff4444",
                    boxShadow: "0 10px 30px rgba(0,0,0,0.5)"
                }
            }).showToast();
        }

        document.getElementById('adminUpdateForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const version = document.getElementById('version').value;
            const changelog = document.getElementById('changelog').value;

            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            const { error } = await _supabase
                .from('updates')
                .insert([{ version, changelog }]);

            if (error) {
                notify("ERRO: " + error.message, false);
                btn.disabled = false;
                btn.innerText = "TENTAR NOVAMENTE";
            } else {
                notify("🚀 UPDATE PUBLICADO NO DASHBOARD DOS CLIENTES!");
                e.target.reset();
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="send"></i> PUBLICAR NOVO';
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
